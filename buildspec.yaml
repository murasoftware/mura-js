version: 0.2
phases:
  install:
    runtime-versions:
      nodejs: 20
  pre_build:
    commands:
      - echo Prebuild started on `date`
      - echo Build environment is $BUILD_ENV
  build:
    commands:
      - echo Build started on `date`
      - npm install
      - npm run build:mura.js
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Publishing to npm...
      - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
      - |-
        set -e
        if [ "$BUILD_ENV" = "rc" ]; then
          npm run publish:mura.js-rc
        elif [ "$BUILD_ENV" = "prod" ]; then
          npm run publish:mura.js
        else
          echo NO RC OR PROD PACKAGED PUBLISHED
        fi
